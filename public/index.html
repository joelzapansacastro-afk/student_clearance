<!DOCTYPE html>
<html>
<head>
  <title>School Clearance System</title>
<style>
  .navbar {
    background: #1f3c88;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
  }

  .logo {
    font-weight: bold;
  }

  .nav-links {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .nav-links a {
    color: white;
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 6px;
  }

  .nav-links a:hover {
    background: rgba(255,255,255,0.2);
  }
</style>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1f3c88, #2f5bd3);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 800px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    p {
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      color: #1f3c88;
      padding: 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .card:hover {
      transform: translateY(-5px);
      background: #f1f5ff;
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>


  <div class="container">

    <h1>School Clearance System</h1>
    <p>Choose a module to continue</p>

    <div class="grid">

      <a class="card" href="registerstudent.html">
        🧑‍🎓 Register Student
      </a>

      <a class="card" href="teacherlogin.html">
        👨‍🏫 Teacher Login
      </a>

      <a class="card" href="dashboard.html">
        📊 Dashboard
      </a>

      <a class="card" href="teacher.html">
        🏫 Teacher Panel
      </a>

      <a class="card" href="addteacher.html">
        ➕ Add Teacher
      </a>

      <a class="card" href="print.html">
        🖨 Print Clearance
      </a>

      <!-- NEW BUTTON -->
      <a class="card" href="print-report.html">
        📜 Clearance Certificate
      </a>

    </div>

    <div class="footer">
      © School Clearance System
    </div>

  </div>

</body>
<script src="auth.js"></script>
</html>
