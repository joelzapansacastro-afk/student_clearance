<!DOCTYPE html>
<html>
<head>
  <title>School Clearance - Home</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1f3c88, #2f5bd3);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    p {
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .btn {
      background: white;
      color: #1f3c88;
      padding: 15px 25px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      transition: 0.2s;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .btn:hover {
      transform: translateY(-3px);
      background: #f1f5ff;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>School Clearance System</h1>
    <p>Account Login</p>

    <div class="buttons">
      
      <a href="teacherlogin.html" class="btn">👨‍🏫 User Login</a>
    </div>
  </div>

</body>
</html>
